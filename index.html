<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Pro</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f4f7;
    color: #222;
}

header {
    background: #111827;
    color: white;
    text-align: center;
    padding: 22px 15px;
}

header h1 {
    margin: 0;
    font-size: 30px;
}

header p {
    margin: 6px 0 0;
    color: #d1d5db;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 15px;
}

.card {
    background: white;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.card h2 {
    margin-top: 0;
    font-size: 20px;
}

label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 9px;
    background: #111827;
    color: white;
    font-size: 17px;
    font-weight: bold;
}

.resultado {
    background: #f3f4f6;
    border-radius: 10px;
    padding: 12px;
    margin-top: 10px;
}

.ganancia {
    font-size: 25px;
    font-weight: bold;
    text-align: center;
    padding: 18px;
    background: #e5e7eb;
    border-radius: 12px;
}
</style>
</head>

<body>

<header>
    <h1>🚕 Taxi Pro</h1>
    <p>Control de ingresos, gastos y ganancias</p>
</header>

<div class="container">

<div class="card">
    <h2>🕐 Jornada</h2>

    <label>Hora de inicio</label>
    <input type="time" id="horaInicio">

    <label>Hora de salida</label>
    <input type="time" id="horaSalida">
</div>

<div class="card">
    <h2>💰 Ingresos</h2>

    <label>Número de pasajeros</label>
    <input type="number" id="pasajeros" value="0" min="0">

    <label>Precio por pasajero</label>
    <input type="number" id="precio" value="80" min="0">

    <div class="resultado">
        Ingreso total: $<span id="ingreso">0.00</span>
    </div>
</div>

<div class="card">
    <h2>💸 Gastos del día</h2>

    <label>⛽ Gasolina</label>
    <input type="number" id="gasolina" value="0" min="0">

    <label>🛣️ Casetas de ida</label>
    <input type="number" id="casetaIda" value="37" min="0">

    <label>🛣️ Casetas de regreso</label>
    <input type="number" id="casetaRegreso" value="37" min="0">

    <label>💵 Otros gastos</label>
    <input type="number" id="otrosGastos" value="0" min="0">

    <button onclick="calcular()">Calcular ganancia</button>
</div>

<div class="card">
    <h2>📊 Resumen</h2>

    <div class="resultado">
        Ingresos: $<span id="resumenIngresos">0.00</span>
    </div>

    <div class="resultado">
        Gastos: $<span id="resumenGastos">0.00</span>
    </div>

    <div class="ganancia">
        Ganancia real: $<span id="ganancia">0.00</span>
    </div>
</div>

</div>

<script>
function calcular() {

    const pasajeros = Number(document.getElementById("pasajeros").value) || 0;
    const precio = Number(document.getElementById("precio").value) || 0;

    const gasolina = Number(document.getElementById("gasolina").value) || 0;
    const casetaIda = Number(document.getElementById("casetaIda").value) || 0;
    const casetaRegreso = Number(document.getElementById("casetaRegreso").value) || 0;
    const otrosGastos = Number(document.getElementById("otrosGastos").value) || 0;

    const ingresos = pasajeros * precio;
    const gastos = gasolina + casetaIda + casetaRegreso + otrosGastos;
    const ganancia = ingresos - gastos;

    document.getElementById("ingreso").textContent = ingresos.toFixed(2);
    document.getElementById("resumenIngresos").textContent = ingresos.toFixed(2);
    document.getElementById("resumenGastos").textContent = gastos.toFixed(2);
    document.getElementById("ganancia").textContent = ganancia.toFixed(2);
}
</script>

</body>
</html>
