<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Taxi Pro 10.1</title><style>body{font-family:sans-serif;background:#f6f7f9;max-width:400px;margin:auto;padding:16px} .card{background:#fff;border-radius:20px;padding:16px;margin-top:12px;box-shadow:0 4px 12px rgba(0,0,0,.05)} .hero{background:#0f172a;color:#fff;border-radius:24px;padding:20px} .btn{width:100%;padding:14px;border-radius:14px;border:0;background:#0f172a;color:#fff;font-weight:800;margin-top:10px} .btn2{background:#eef2f7;color:#000} .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;place-items:center;padding:16px}.modal.on{display:grid} .box{background:#fff;border-radius:20px;padding:20px;width:100%}</style></head><body>
<div class="hero"><small>GANANCIA REAL HOY</small><h1 id="profit" style="font-size:36px">$0</h1><div id="sub" style="font-size:12px;opacity:.7"></div></div>
<div class="card"><button class="btn btn2" onclick="document.getElementById('m1').classList.add('on')">🚕 Registrar Viaje</button><button class="btn btn2" onclick="document.getElementById('m2').classList.add('on')">⛽ Gasolina</button></div>
<div class="card"><b>Hoy se descuenta:</b><div id="list"></div></div>
<div class="card"><b>Próximos pagos:</b><div id="next"></div></div>
<div id="m1" class="modal"><div class="box"><h3>Viaje</h3><input id="pax" type="number" value="1" style="width:100%;padding:12px;margin-top:10px;border-radius:12px;border:1px solid #ddd"><input id="tar" type="number" value="80" style="width:100%;padding:12px;margin-top:8px;border-radius:12px;border:1px solid #ddd"><button class="btn" onclick="saveT()">Guardar</button><button class="btn btn2" onclick="closeAll()">Cerrar</button></div></div>
<div id="m2" class="modal"><div class="box"><h3>Gas</h3><input id="gas" type="number" style="width:100%;padding:12px;margin-top:10px;border-radius:12px;border:1px solid #ddd"><button class="btn" onclick="saveG()">Guardar</button><button class="btn btn2" onclick="closeAll()">Cerrar</button></div></div>
<script>
function closeAll(){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('on'))}
var D;try{D=JSON.parse(localStorage.getItem('taxi101'))||{t:[],g:[]}}catch(e){D={t:[],g:[]}}
function today(){return new Date().toISOString().slice(0,10)}
function save(){localStorage.setItem('taxi101',JSON.stringify(D))}
function gastos(){return [{n:'Aveo $500',m:500},{n:'El Potrero $120 (hoy)',m:120}]} // Simplificado para prueba
function render(){
var ing=D.t.filter(x=>x.d==today()).reduce((a,b)=>a+b.v,0);
var gas=D.g.filter(x=>x.d==today()).reduce((a,b)=>a+b.m,0);
var fijo=500+120;
var gan=ing-fijo-gas;
document.getElementById('profit').innerText='$'+gan;
document.getElementById('sub').innerText=ing+' ingresos - '+(fijo+gas)+' gastos';
document.getElementById('list').innerHTML='<div>Aveo $500</div><div>Potrero $120</div>'+(gas?'<div>Gas $'+gas+'</div>':'');
document.getElementById('next').innerHTML='<div>24 jul - Checadora $300</div><div>28 jul - Potrero $120</div><div>29 jul - Villa $220</div>';
}
function saveT(){var p=parseInt(document.getElementById('pax').value)||1;var t=parseInt(document.getElementById('tar').value)||80;D.t.push({d:today(),v:p*t});save();closeAll();render()}
function saveG(){var m=parseInt(document.getElementById('gas').value)||0;if(m){D.g.push({d:today(),m:m});save();closeAll();render()}}
render();
</script></body></html>
